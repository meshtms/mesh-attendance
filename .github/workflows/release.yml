name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.release }}
    steps:
      - id: check
        run: |
          if echo "${{ github.event.head_commit.message }}" | grep -q "#release"; then
            echo "release=true" >> $GITHUB_OUTPUT
          else
            echo "release=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Bump version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          IFS='.' read -r major minor patch <<< "$VERSION"
          NEW_VERSION="$major.$minor.$((patch + 1))"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf-8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "Bumped to $NEW_VERSION"

      - name: Build and publish
        run: npm run build:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$NEW_VERSION"
          # Wait for release to exist
          sleep 5
          # Delete source archives that GitHub auto-attaches
          for asset_id in $(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/meshtms/mesh-attendance/releases/tags/$TAG" \
            | node -e "
              const data=require('fs').readFileSync('/dev/stdin','utf-8');
              const r=JSON.parse(data);
              (r.assets||[]).forEach(a=>{
                if(a.name.endsWith('.zip')||a.name.endsWith('.tar.gz')||a.name.endsWith('.blockmap'))
                  console.log(a.id)
              })
            "); do
            curl -s -X DELETE -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/meshtms/mesh-attendance/releases/assets/$asset_id"
          done

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add package.json
          git commit -m "v$NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push && git push --tags
