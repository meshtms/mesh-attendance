name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.release }}
    steps:
      - id: check
        run: |
          if echo "${{ github.event.head_commit.message }}" | grep -q "#release"; then
            echo "release=true" >> $GITHUB_OUTPUT
          else
            echo "release=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Bump version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          IFS='.' read -r major minor patch <<< "$VERSION"
          NEW_VERSION="$major.$minor.$((patch + 1))"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf-8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "Bumped to $NEW_VERSION"

      - name: Build
        run: npx tsc && npx vite build && npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump and tag
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add package.json
          git commit -m "v$NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push && git push --tags

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$NEW_VERSION"
          # Find the setup exe and latest.yml
          SETUP_EXE=$(ls dist/*.exe 2>/dev/null | head -1)
          LATEST_YML=$(ls dist/latest.yml 2>/dev/null | head -1)

          # Create release with assets
          RELEASE_ARGS="--tag $TAG --title $TAG --latest"
          if [ -n "$SETUP_EXE" ]; then
            RELEASE_ARGS="$RELEASE_ARGS $SETUP_EXE"
          fi
          if [ -n "$LATEST_YML" ]; then
            RELEASE_ARGS="$RELEASE_ARGS $LATEST_YML"
          fi

          npx gh-release-cli create $RELEASE_ARGS 2>/dev/null || \
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/meshtms/mesh-attendance/releases" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"draft\":false}"

          # Get release id and upload assets
          RELEASE_ID=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/meshtms/mesh-attendance/releases/tags/$TAG" \
            | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf-8')).id")

          for FILE in dist/*.exe dist/latest.yml; do
            [ -f "$FILE" ] || continue
            FILENAME=$(basename "$FILE")
            echo "Uploading $FILENAME..."
            curl -s -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$FILE" \
              "https://uploads.github.com/repos/meshtms/mesh-attendance/releases/$RELEASE_ID/assets?name=$FILENAME"
          done
