name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.release }}
    steps:
      - id: check
        run: |
          if echo "${{ github.event.head_commit.message }}" | grep -q "#release"; then
            echo "release=true" >> $GITHUB_OUTPUT
          else
            echo "release=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Bump version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          IFS='.' read -r major minor patch <<< "$VERSION"
          NEW_VERSION="$major.$minor.$((patch + 1))"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf-8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "Bumped to $NEW_VERSION"

      - name: Build
        run: npx tsc && npx vite build && npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump and tag
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add package.json
          git commit -m "v$NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push && git push --tags

      - name: Create GitHub Release and upload assets
        shell: node {0}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ env.NEW_VERSION }}
        run: |
          const https = require('https');
          const fs = require('fs');
          const path = require('path');

          const token = process.env.GH_TOKEN;
          const tag = `v${process.env.NEW_VERSION}`;
          const repo = 'meshtms/mesh-attendance';

          function api(method, endpoint, body) {
            return new Promise((resolve, reject) => {
              const isUpload = endpoint.startsWith('https://uploads.');
              const url = isUpload ? new URL(endpoint) : new URL(`https://api.github.com${endpoint}`);
              const opts = {
                hostname: url.hostname,
                path: url.pathname + url.search,
                method,
                headers: {
                  'Authorization': `token ${token}`,
                  'User-Agent': 'mesh-attendance-release',
                  'Accept': 'application/vnd.github.v3+json',
                },
              };
              if (body && !Buffer.isBuffer(body)) {
                const json = JSON.stringify(body);
                opts.headers['Content-Type'] = 'application/json';
                opts.headers['Content-Length'] = Buffer.byteLength(json);
                const req = https.request(opts, res => {
                  let data = '';
                  res.on('data', c => data += c);
                  res.on('end', () => resolve(JSON.parse(data)));
                });
                req.on('error', reject);
                req.write(json);
                req.end();
              } else if (Buffer.isBuffer(body)) {
                opts.headers['Content-Type'] = 'application/octet-stream';
                opts.headers['Content-Length'] = body.length;
                const req = https.request(opts, res => {
                  let data = '';
                  res.on('data', c => data += c);
                  res.on('end', () => resolve(JSON.parse(data)));
                });
                req.on('error', reject);
                req.write(body);
                req.end();
              } else {
                const req = https.request(opts, res => {
                  let data = '';
                  res.on('data', c => data += c);
                  res.on('end', () => resolve(JSON.parse(data)));
                });
                req.on('error', reject);
                req.end();
              }
            });
          }

          async function run() {
            // Create release
            console.log(`Creating release ${tag}...`);
            const release = await api('POST', `/repos/${repo}/releases`, {
              tag_name: tag,
              name: tag,
              draft: false,
            });
            console.log(`Release created: ${release.html_url}`);

            // Find and upload assets
            const distDir = path.join(process.cwd(), 'dist');
            const files = fs.readdirSync(distDir).filter(f => f.endsWith('.exe') || f === 'latest.yml');

            for (const file of files) {
              const filePath = path.join(distDir, file);
              const fileData = fs.readFileSync(filePath);
              console.log(`Uploading ${file} (${(fileData.length / 1024 / 1024).toFixed(1)} MB)...`);
              const uploadUrl = `https://uploads.github.com/repos/${repo}/releases/${release.id}/assets?name=${encodeURIComponent(file)}`;
              await api('POST', uploadUrl, fileData);
              console.log(`Uploaded ${file}`);
            }

            console.log('Done!');
          }

          run().catch(err => { console.error(err); process.exit(1); });
